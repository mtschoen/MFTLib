# aislop — AI-slop quality gate (https://github.com/scanaislop/aislop)
#
# STATUS: ready-but-gated. As of 2026-05-29 aislop (latest 0.9.6) does NOT
# support C# — it covers TS/JS, Python, Go, Rust, Ruby, PHP, Java. MFTLib is
# C# + C++:
#   * C#  (MFTLib, TestProgram, Benchmark, MFTLib.Tests) — covered ONCE aislop's
#         C# engine ships.
#   * C++ (MFTLibNative) — NEVER covered by aislop; clang-tidy + cppcheck remain
#         its quality gate and that does not change.
#
# Until a C#-capable aislop version lands, aislop scans 0 relevant files here and
# false-greens at a meaningless 100. So the gate is deliberately NOT active:
# the CI step is left disabled and the per-edit hook is NOT installed. This file
# is staged so the gate can be flipped on in one step when C# support arrives.
#
# FLIP-ON (when a C#-capable aislop version ships — pin THAT version, never @latest):
#   1. Re-baseline the floor:  npx aislop@<csharp-ver> ci .   # read .score, set failBelow below
#   2. Per-edit hook (repo-local, pins its own version):
#        npx aislop@<csharp-ver> hook install --claude --project
#   3. CI gate: enable the disabled `aislop` step in .gitea/workflows/test.yml
#      (use the CLI `npx --yes aislop@<csharp-ver> ci .`, NOT the GitHub composite action).

ci:
  # Intended floor (the fleet baseline used by git-wizard). RE-MEASURE against the
  # real C# score before enabling — clean up first, then gate; never ratchet up
  # from a false-positive-dominated baseline.
  failBelow: 80

# aislop scores the whole repo. Keep build output, generated sources, and the
# C++ tree (never covered) out of the scan.
exclude:
  - "**/bin/**"
  - "**/obj/**"
  - "**/Debug/**"
  - "**/Release/**"
  - "x64/**"
  - "build/**"
  - "**/*.Designer.cs"
  - "**/*.g.cs"
  - "MFTLibNative/**"
