# aislop quality gate config - https://github.com/scanaislop/aislop
#
# `aislop ci` produces a whole-repo score (0-100); the Gitea Actions gate
# (.gitea/workflows/aislop.yml) fails the build when the score is below
# failBelow. The C# engine lives in the personal fork github.com/mtschoen/aislop
# (the public npm aislop is Python-only); CI installs its prebuilt @schoen/aislop
# tarball from the Gitea npm registry via `npm ci`, pinned by content (sha512
# integrity) in package.json + package-lock.json.
# This config follows the conventional C# baseline (csharp.yml),
# mirroring git-wizard.
#
# MFTLib is C# + C++, and BOTH trees are scored by this gate. The native tree
# (MFTLibNative) runs cppcheck + clang-tidy + clang-format + ai-slop AND jb
# inspectcode (ReSharper C++, lint.cpp.jb) at a SUGGESTION floor - the full
# inspection tier, nothing suppressed. lint.csharp.jbProjects + lint.cpp.jbProjects
# scope the single inspectcode pass to the C# and C++ projects respectively; the
# exclude block keeps only build output out of the file-scanning engines.
#
# The repo is held at 0 findings (score 100), so failBelow is 100: any new
# finding (a narrative comment, a swallowed exception, an oversized function)
# red-lights the gate. Lower it only with a documented reason.

version: 1

engines:
  format: true
  lint: true
  code-quality: true
  ai-slop: true
  architecture: false
  security: true

lint:
  csharp:
    jb: true
    roslynator: true
    jbSeverityFloor: WARNING
    jbExcludeTypes: [InconsistentNaming]
    jbProjects: "MFTLib;MFTLib.Tests;TestProgram;Benchmark;MFTLibTestExtensions"
  cpp:
    # The native tree is now scored by this gate (no longer excluded). It runs
    # cppcheck + clang-tidy + clang-format + ai-slop AND jb inspectcode
    # (ReSharper C++). Floor is SUGGESTION (full-tier sweep): every real
    # inspection must be fixed, nothing suppressed.
    jb: true
    jbSeverityFloor: SUGGESTION
    jbProjects: "MFTLibNative"

quality:
  maxFunctionLoc: 80
  maxFileLoc: 400
  maxNesting: 5
  maxParams: 6

security:
  audit: false
  auditTimeout: 30000

scoring:
  weights:
    format: 0.5
    lint: 1.0
    code-quality: 1.5
    ai-slop: 1.0
    architecture: 1.0
    security: 2.5
  thresholds:
    good: 75
    ok: 50

ci:
  failBelow: 100
  format: json

# aislop scores the whole repo (C# and the native C++ tree). Keep only build
# output and generated sources out of the file-scanning engines.
exclude:
  - "**/bin/**"
  - "**/obj/**"
  - "**/Debug/**"
  - "**/Release/**"
  - "x64/**"
  - "build/**"
  - "**/*.Designer.cs"
  - "**/*.g.cs"
  - "MFTLibNative/build/**"
