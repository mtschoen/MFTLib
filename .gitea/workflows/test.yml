# .gitea/workflows/test.yml
name: test
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      # Node.js uses its bundled cert store, not Windows trust. Gitea's mkcert-signed
      # cert isn't in it. Long-term fix: install mkcert CA into Node.js cert store
      # on the runner. Short-term: bypass.
      NODE_EXTRA_CA_CERTS: C:\actions-runner\mkcert-ca.pem
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install reportgenerator
        shell: pwsh
        run: |
          dotnet tool update --global dotnet-reportgenerator-globaltool
          echo "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Run coverage
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: scripts\run-coverage.ps1 -NonInteractive

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: windows-coverage
          path: |
            MFTLib.Tests/coverage.xml
            MFTLib.Tests/coverage-report/**

      - name: Post coverage status
        if: always()
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $summary = "MFTLib.Tests/coverage-report/Summary.txt"
          $pct = $null
          if (Test-Path $summary) {
            $match = Select-String -Path $summary -Pattern 'Line coverage:\s*([\d.]+)%' | Select-Object -First 1
            if ($match) { $pct = $match.Matches[0].Groups[1].Value }
          }
          if ($null -eq $pct) { $state = "error"; $desc = "coverage measurement failed" }
          else { $state = "success"; $desc = "$pct% line coverage" }
          $runUrl = "$env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID"
          $body = @{ context = "pr-crew/coverage"; state = $state; description = $desc; target_url = $runUrl } | ConvertTo-Json -Compress
          curl.exe -sk -X POST `
            -H "Authorization: token $env:GITHUB_TOKEN" `
            -H "Content-Type: application/json" `
            -d $body `
            "$env:GITHUB_SERVER_URL/api/v1/repos/$env:GITHUB_REPOSITORY/statuses/$env:GITHUB_SHA"

  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        # gcovr from apt (universe) instead of pip: the runner's egress to
        # pypi.org goes through a TLS-intercepting proxy whose CA isn't in pip's
        # bundled certifi, so `pip install gcovr` fails cert verification. apt
        # uses the system trust store (which has the proxy CA) and works. Ubuntu
        # noble ships gcovr 7.x, which supports the value form of
        # --gcov-ignore-parse-errors that coverage-linux.sh relies on.
        run: |
          apt-get update
          apt-get install -y cmake ninja-build gcovr

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Run coverage
        run: bash scripts/coverage-linux.sh

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: linux-coverage
          path: coverage-report/
